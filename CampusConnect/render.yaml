# Render Deployment Configuration
# This file configures deployment for all Campus Connect services on Render

services:
  # API Gateway
  - type: web
    name: campus-connect-api-gateway
    runtime: python3
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    sourceDir: backend/api-gateway
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: AUTH_SERVICE_URL
        value: https://campus-connect-auth.onrender.com
      - key: MEETUPS_SERVICE_URL
        value: https://campus-connect-meetups.onrender.com
      - key: MARKETPLACE_SERVICE_URL
        value: https://campus-connect-marketplace.onrender.com
      - key: STOLEN_FOUND_SERVICE_URL
        value: https://campus-connect-stolen-found.onrender.com
      - key: ROOMS_SERVICE_URL
        value: https://campus-connect-rooms.onrender.com
      - key: RENTAL_SERVICE_URL
        value: https://campus-connect-rental.onrender.com
      - key: CLUBS_SERVICE_URL
        value: https://campus-connect-clubs.onrender.com
      - key: JOBS_SERVICE_URL
        value: https://campus-connect-jobs.onrender.com
      - key: NOTES_SERVICE_URL
        value: https://campus-connect-notes.onrender.com
      - key: FOOD_SERVICE_URL
        value: https://campus-connect-food.onrender.com

  # Auth Service
  - type: web
    name: campus-connect-auth
    runtime: python3
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    sourceDir: backend/services/auth
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MYSQL_HOST
        value: mysql
      - key: MYSQL_PORT
        value: 3306
      - key: MYSQL_DATABASE
        value: auth_db
      - key: MYSQL_USER
        fromSecret: db_user
      - key: MYSQL_PASSWORD
        fromSecret: db_password
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REDIS_URL
        fromSecret: redis_url

