# Database
databases:
  - name: campus-connect-db
    databaseName: campus_connect
    user: campus_user
    plan: starter

# Redis for caching and sessions
redis:
  - name: campus-connect-redis
    plan: starter

# Environment groups for shared secrets
envVarGroups:
  - name: campus-connect-secrets
    envVars:
      - key: db_user
        value: campus_user
      - key: db_password
        generateValue: true
      - key: redis_url
        value: redis://campus-connect-redis:6379
      - key: google_maps_api_key
        value: your_google_maps_api_key
      - key: firebase_project_id
        value: your_firebase_project_id
      - key: firebase_private_key
        value: your_firebase_private_key
      - key: firebase_client_email
        value: your_firebase_client_email
      - key: cloudinary_cloud_name
        value: your_cloudinary_cloud_name
      - key: cloudinary_api_key
        value: your_cloudinary_api_key
      - key: cloudinary_api_secret
        value: your_cloudinary_api_secret